[[sources]]
id = "medsl"
name = "MIT Election Data and Science Lab (MEDSL)"
homepage = "https://electionlab.mit.edu/"

  [[sources.datasets]]
  id = "landing"
  name = "MEDSL datasets landing page"
  type = "http_page"
  url = "https://electionlab.mit.edu/data"
  crawl_download = true
  crawl_max_links = 200
  crawl_same_host_only = false
  crawl_strategy = "dataverse"
