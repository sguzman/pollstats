# Override via env:
# - POLLSTATS_CONFIG (path to this file)
# - POLLSTATS_PG_URL (Postgres URL)

store_dir = ".cache/pollstats"
sources_file = "config/sources.toml"

[postgres]
user = "admin"
pass = "admin"
host = "localhost"
port = 5432
db = "data"
sslmode = "disable"

# HTTP
http_timeout_seconds = 600
user_agent = "pollstats/0.1 (+local)"
http_retries = 3

# How aggressively to fetch datasets.
# 1 = download each one at a time (default).
download_concurrency = 1

# Download rate limit (kilobytes per second) to improve robustness on flaky connections.
download_rate_limit_kbps = 500

[aria]
# Where to write aria2 artifacts (relative to project dir).
output_dir = ".cache/pollstats/aria"
urls_filename = "urls"
conf_filename = "aria2.conf"

# Default conf template to copy (and optionally patch) if `aria.emit` is not set.
conf_template_file = "tmp/conf.conf"

[aria.emit]
# Optional: if set (non-empty), emit these exact key/value lines into aria2.conf.
# Example keys (quote keys containing hyphens):
# "max-concurrent-downloads" = "1"
# "max-download-limit" = "500000"
