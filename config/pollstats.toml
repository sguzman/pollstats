# Override via env:
# - POLLSTATS_CONFIG (path to this file)
# - POLLSTATS_PG_URL (Postgres URL)

store_dir = ".cache/pollstats"
sources_file = "config/sources.toml"

[postgres]
user = "admin"
pass = "admin"
host = "localhost"
port = 5432
db = "data"
sslmode = "disable"

# HTTP
http_timeout_seconds = 600
user_agent = "pollstats/0.1 (+local)"
http_retries = 3

# How aggressively to fetch datasets.
# 1 = download each one at a time (default).
download_concurrency = 1
